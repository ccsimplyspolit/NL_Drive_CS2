name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Create/update a GitHub Release from this run'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      release_tag:
        description: 'Release tag for manual publishing, for example v2'
        required: false
        default: 'v2'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout NL_Drive_CS2
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore WDK / SDK NuGet packages
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path packages | Out-Null
          nuget install Microsoft.Windows.SDK.CPP -Version 10.0.26100.7175 -OutputDirectory packages
          nuget install Microsoft.Windows.SDK.CPP.x64 -Version 10.0.26100.7175 -OutputDirectory packages
          nuget install Microsoft.Windows.WDK.x64 -Version 10.0.26100.6584 -OutputDirectory packages

      - name: Clone kdmapper dependency
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $parent = Split-Path -Parent $env:GITHUB_WORKSPACE
          $kdmapper = Join-Path $parent 'kdmapper'
          git clone --depth 1 https://github.com/TheCruZ/kdmapper $kdmapper

      - name: Build kdmapper static library
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $parent = Split-Path -Parent $env:GITHUB_WORKSPACE
          msbuild (Join-Path $parent 'kdmapper\kdmapper.sln') /p:Configuration=lib-Release /p:Platform=x64 /m

      - name: Build kits and zip packages
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build_release.ps1

      - name: Upload F20Kit artifact
        uses: actions/upload-artifact@v4
        with:
          name: F20Kit
          path: kits/F20Kit/F20Kit.zip
          if-no-files-found: error

      - name: Upload IsValveDS artifact
        uses: actions/upload-artifact@v4
        with:
          name: IsValveDS_spoofer
          path: kits/IsValveDS/IsValveDS_spoofer.zip
          if-no-files-found: error

      - name: Generate release notes
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $f20 = Get-FileHash kits\F20Kit\F20Kit.zip -Algorithm SHA256
          $isv = Get-FileHash kits\IsValveDS\IsValveDS_spoofer.zip -Algorithm SHA256
          @"
          ## NL_Drive_CS2 release

          Always use the latest release. Older releases are kept only for reference.

          ### Assets

          | Artifact | SHA-256 |
          | --- | --- |
          | F20Kit.zip | $($f20.Hash) |
          | IsValveDS_spoofer.zip | $($isv.Hash) |

          ### What is included

          - F20Kit: kernel-mode round-kill monitor with PDB-based kbdclass callback lookup.
          - IsValveDS: kernel-mode m_bIsValveDS shared-memory console kit.
          - App-local VC++ runtime DLLs plus optional install_vcredist.bat.
          - Pre-load diagnostics, safe stop events, and tracked kdunmap cleanup.

          Automated build from $env:GITHUB_SHA.
          "@ | Set-Content -LiteralPath release-notes.md -Encoding UTF8

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: NL_Drive_CS2 ${{ github.event.inputs.release_tag || github.ref_name }}
          make_latest: true
          files: |
            kits/F20Kit/F20Kit.zip
            kits/IsValveDS/IsValveDS_spoofer.zip
          body_path: release-notes.md
